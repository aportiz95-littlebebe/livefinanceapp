clone:
  git:
    image: woodpeckerci/plugin-git:2
    commands:
      - echo "clone handled in steps"

when:
  - event: push
  - event: manual

steps:
  - name: clone
    image: alpine/git:v2.54.0
    environment:
      GIT_SSL_CAINFO: /stacks/certs/ca.crt
      FORGEJO_REGISTRY_TOKEN:
        from_secret: forgejo_registry_token
    commands:
      - git clone https://jason:$FORGEJO_REGISTRY_TOKEN@10.70.70.70:3000/${CI_REPO_OWNER}/${CI_REPO_NAME}.git .
      - git checkout ${CI_COMMIT_SHA}

  - name: build
    image: gcr.io/kaniko-project/executor:v1.23.2-debug
    volumes:
      - /var/lib/docker-stacks/certs/ca.crt:/kaniko/ssl/certs/ca.crt
    environment:
      FORGEJO_REGISTRY_TOKEN:
        from_secret: forgejo_registry_token
    commands:
      - mkdir -p /kaniko/.docker
      - printf '{"auths":{"10.70.70.70:3000":{"auth":"%s"}}}' "$(printf 'jason:%s' "$FORGEJO_REGISTRY_TOKEN" | base64 | tr -d '\n')" > /kaniko/.docker/config.json
      - /kaniko/executor
        --context .
        --dockerfile Dockerfile
        --destination 10.70.70.70:3000/${CI_REPO_OWNER}/${CI_REPO_NAME}:latest
        --registry-certificate 10.70.70.70:3000=/kaniko/ssl/certs/ca.crt

  - name: deploy
    image: docker:27-cli
    volumes:
      - /var/lib/docker-stacks:/stacks
    environment:
      DOCKER_HOST: tcp://10.70.70.70:2375
      FORGEJO_REGISTRY_TOKEN:
        from_secret: forgejo_registry_token
      STREAMLIT_SECRETS:
        from_secret: STREAMLIT_SECRETS
    commands:
      - |
        mkdir -p ~/.docker
        printf '{"auths":{"10.70.70.70:3000":{"auth":"%s"}}}' "$(printf 'jason:%s' "$FORGEJO_REGISTRY_TOKEN" | base64 | tr -d '\n')" > ~/.docker/config.json
        mkdir -p /stacks/${CI_REPO_NAME}/appdata/.streamlit
        printf '%s' "$STREAMLIT_SECRETS" > /stacks/${CI_REPO_NAME}/appdata/.streamlit/secrets.toml
        cp ./compose.yml /stacks/${CI_REPO_NAME}/compose.yml
        docker compose -f /stacks/${CI_REPO_NAME}/compose.yml pull
        docker compose -f /stacks/${CI_REPO_NAME}/compose.yml up -d --remove-orphans
